# =============================================================================
# nginx Configuration for Chesapeake City Agentic AI Chatbot
# Template — use __DOMAIN_NAME__ and __ADMIN_EMAIL__ placeholders.
# The deploy workflow substitutes them with actual values from secrets.
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic Settings ──────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 10m;

    # ── MIME Types ──────────────────────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # ── Rate Limiting ───────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=chat:10m rate=5r/s;

    # ── Security Headers Map ────────────────────────────────────────────────
    map $sent_http_content_type $security_headers {
        default "";
        "text/html" "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.deepseek.com; frame-ancestors 'self';";
    }

    # ── Gzip Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # ── Open File Cache ─────────────────────────────────────────────────────
    open_file_cache max=10000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ── Upstream (Chatbot Backend) ──────────────────────────────────────────
    upstream chatbot_backend {
        server chatbot:3000;
        keepalive 32;
    }

    # ── Cache Zones ─────────────────────────────────────────────────────────
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # ═════════════════════════════════════════════════════════════════════════
    # HTTP Server — redirects everything to HTTPS (when domain is set)
    # ═════════════════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name __DOMAIN_NAME__ _;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ── Let's Encrypt ACME challenge ────────────────────────────────────
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/letsencrypt;
            default_type text/plain;
            allow all;
        }

        # ── Redirect everything to HTTPS ────────────────────────────────────
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ═════════════════════════════════════════════════════════════════════════
    # HTTPS Server — serves the application with SSL
    # ═════════════════════════════════════════════════════════════════════════
    # __HTTPS_SERVER_BLOCK_START__
    server {
        listen 443 ssl;
        http2 on;
        listen [::]:443 ssl;
        server_name __DOMAIN_NAME__;

        # ── SSL Certificates (managed by Certbot / Let's Encrypt) ───────────
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

        # ── SSL Configuration ───────────────────────────────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_dhparam /etc/nginx/ssl/dhparam.pem;

        # ── HSTS & Security Headers ─────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy $security_headers always;

        # ── Let's Encrypt ACME challenge (also on HTTPS for renewals) ───────
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/letsencrypt;
            default_type text/plain;
            allow all;
        }

        # ── Main proxy — all traffic to chatbot backend ─────────────────────
        location / {
            proxy_pass http://chatbot_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;
            proxy_redirect off;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Health check endpoint ───────────────────────────────────────────
        location /health {
            access_log off;
            proxy_pass http://chatbot_backend/api/chat;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Rate-limited API endpoints ──────────────────────────────────────
        location ~ ^/api/(chat|ingest) {
            limit_req zone=chat burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://chatbot_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeouts (longer for streaming chat)
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 120s;
        }

        # ── Static files caching ────────────────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://chatbot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache static_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 302 1h;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Deny access to hidden files ─────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Deny access to sensitive files ──────────────────────────────────
        location ~* (\.env|\.git|\.svn|\.htaccess|Dockerfile|docker-compose\.yml) {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Custom error pages ──────────────────────────────────────────────
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /404.html {
            internal;
        }

        location = /50x.html {
            internal;
        }
    }
}
