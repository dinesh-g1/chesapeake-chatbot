# =============================================================================
# Chesapeake City Chatbot — Deploy to VPS
# =============================================================================
# Runs on every push to `main` (and can be triggered manually).
#
# Required GitHub Secrets (set them in your repo → Settings → Secrets → Actions):
#
#   VPS_HOST          — Public IP or hostname of your VPS (e.g. "203.0.113.10")
#   VPS_USER          — SSH user (e.g. "root" or "deploy")
#   VPS_SSH_KEY       — Private SSH key (PEM format, the whole file)
#   VPS_KNOWN_HOSTS   — Output of `ssh-keyscan <VPS_HOST>` (see below)
#
#   DOMAIN_NAME       — Your domain (e.g. "chatbot.yourcity.gov")
#   ADMIN_EMAIL       — Email for Let's Encrypt (e.g. "admin@yourcity.gov")
#
#   LLM_API_KEY       — DeepSeek (or other LLM provider) API key
#   LLM_PROVIDER      — (optional) "deepseek" (default)
#   LLM_MODEL         — (optional) "deepseek-chat" (default)
#   LLM_BASE_URL      — (optional) "https://api.deepseek.com" (default)
#   LLM_TEMPERATURE   — (optional) "0.7" (default)
#   LLM_MAX_TOKENS    — (optional) "4000" (default)
#
#   EMBEDDING_API_KEY     — (optional) API key if using a remote embedding provider
#   EMBEDDING_PROVIDER    — (optional) "qwen" (default)
#   EMBEDDING_MODEL       — (optional) "qwen2.5:1.5b" (default)
#   EMBEDDING_BASE_URL    — (optional) URL for embedding service
#   EMBEDDING_DIMENSION   — (optional) "1536" (default)
#
#   VECTOR_STORE_PROVIDER — (optional) "sqlite" (default)
#   DATABASE_URL          — (optional) "sqlite:///app/data/vector_store.db" (default)
#
#   RUN_DATA_INGESTION    — (optional) Set "true" on first deploy to scrape & embed
#
#   NODE_OPTIONS          — (optional) "--max-old-space-size=4096" (default)
#   LOG_LEVEL             — (optional) "info" (default)
#
# How to get VPS_KNOWN_HOSTS:
#   ssh-keyscan -H <VPS_IP_OR_HOSTNAME>
#   Copy the output (starts with "|1|..." or the hostname) and paste it as the secret.
# =============================================================================

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_ingestion:
        description: "Run data ingestion on deploy"
        required: false
        default: false
        type: boolean

# ── Concurrency ──────────────────────────────────────────────────────────────
# Cancel any in-flight deploy when a new push arrives.
concurrency:
  group: vps-deploy
  cancel-in-progress: true

# ── Environment variables available in every job step ────────────────────────
env:
  COMPOSE_PROJECT_NAME: chesapeake-chatbot
  DEPLOY_DIR: /opt/chesapeake-chatbot
  DOCKER_BUILDKIT: 1

jobs:
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. SSH setup ──────────────────────────────────────────────────────
      - name: 🔑 Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VPS_SSH_KEY }}
          known_hosts: ${{ secrets.VPS_KNOWN_HOSTS }}

      # ── 3. Build the .env file from secrets ───────────────────────────────
      - name: 📝 Generate .env file
        run: |
          cat > .env.production << 'ENVEOF'
          # ── Application ──────────────────────────────────────────────
          NODE_ENV=production
          PORT=3000
          HOSTNAME=0.0.0.0

          # ── LLM (DeepSeek) ──────────────────────────────────────────
          LLM_PROVIDER=${{ secrets.LLM_PROVIDER || 'deepseek' }}
          LLM_MODEL=${{ secrets.LLM_MODEL || 'deepseek-chat' }}
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL=${{ secrets.LLM_BASE_URL || 'https://api.deepseek.com' }}
          LLM_TEMPERATURE=${{ secrets.LLM_TEMPERATURE || '0.7' }}
          LLM_MAX_TOKENS=${{ secrets.LLM_MAX_TOKENS || '4000' }}

          # ── Embeddings ──────────────────────────────────────────────
          EMBEDDING_PROVIDER=${{ secrets.EMBEDDING_PROVIDER || 'qwen' }}
          EMBEDDING_MODEL=${{ secrets.EMBEDDING_MODEL || 'qwen2.5:1.5b' }}
          EMBEDDING_API_KEY=${{ secrets.EMBEDDING_API_KEY || '' }}
          EMBEDDING_BASE_URL=${{ secrets.EMBEDDING_BASE_URL || 'http://ollama:11434' }}
          EMBEDDING_DIMENSION=${{ secrets.EMBEDDING_DIMENSION || '1536' }}

          # ── Vector Store ────────────────────────────────────────────
          VECTOR_STORE_PROVIDER=${{ secrets.VECTOR_STORE_PROVIDER || 'sqlite' }}
          DATABASE_URL=${{ secrets.DATABASE_URL || 'sqlite:///app/data/vector_store.db' }}

          # ── Scraper / RAG ───────────────────────────────────────────
          SCRAPER_BASE_URL=${{ secrets.SCRAPER_BASE_URL || 'https://www.cityofchesapeake.net' }}
          SCRAPER_MAX_PAGES=${{ secrets.SCRAPER_MAX_PAGES || '30' }}
          SCRAPER_DELAY=${{ secrets.SCRAPER_DELAY || '1000' }}
          RAG_CHUNK_SIZE=${{ secrets.RAG_CHUNK_SIZE || '512' }}
          RAG_CHUNK_OVERLAP=${{ secrets.RAG_CHUNK_OVERLAP || '50' }}
          RAG_TOP_K=${{ secrets.RAG_TOP_K || '5' }}
          RAG_SCORE_THRESHOLD=${{ secrets.RAG_SCORE_THRESHOLD || '0.7' }}

          # ── Chat ────────────────────────────────────────────────────
          CHAT_MAX_HISTORY_LENGTH=${{ secrets.CHAT_MAX_HISTORY_LENGTH || '20' }}
          CHAT_SESSION_TIMEOUT=${{ secrets.CHAT_SESSION_TIMEOUT || '1800000' }}
          CHAT_ENABLE_STREAMING=${{ secrets.CHAT_ENABLE_STREAMING || 'true' }}
          CHAT_DEFAULT_TEMPERATURE=${{ secrets.CHAT_DEFAULT_TEMPERATURE || '0.7' }}

          # ── Deployment ──────────────────────────────────────────────
          API_URL=https://${{ secrets.DOMAIN_NAME }}
          FRONTEND_URL=https://${{ secrets.DOMAIN_NAME }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL || 'info' }}
          ENABLE_ANALYTICS=${{ secrets.ENABLE_ANALYTICS || 'false' }}

          # ── Ingestion (controlled per-deploy) ───────────────────────
          RUN_DATA_INGESTION=${{ (github.event.inputs.run_ingestion == 'true' && 'true') || secrets.RUN_DATA_INGESTION || 'false' }}
          INGESTION_MAX_PAGES=${{ secrets.INGESTION_MAX_PAGES || '30' }}
          INGESTION_MAX_DEPTH=${{ secrets.INGESTION_MAX_DEPTH || '2' }}
          INGESTION_CHUNK_SIZE=${{ secrets.INGESTION_CHUNK_SIZE || '512' }}
          INGESTION_CHUNK_OVERLAP=${{ secrets.INGESTION_CHUNK_OVERLAP || '50' }}
          INGESTION_SKIP_EMBEDDING=${{ secrets.INGESTION_SKIP_EMBEDDING || 'false' }}
          INGESTION_VERBOSE=${{ secrets.INGESTION_VERBOSE || 'false' }}

          # ── System ──────────────────────────────────────────────────
          VERBOSE_STARTUP=${{ secrets.VERBOSE_STARTUP || 'false' }}
          NODE_OPTIONS=${{ secrets.NODE_OPTIONS || '--max-old-space-size=4096' }}
          ENVEOF

          echo "✅ .env.production generated ($(wc -l < .env.production) lines)"

      # ── 4. Prepare the domain-substituted nginx config ────────────────────
      - name: 🌐 Generate nginx config
        run: |
          DOMAIN_NAME="${{ secrets.DOMAIN_NAME }}" \
          ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
          python3 scripts/generate-nginx-config.py nginx/nginx.conf > nginx/nginx.conf.deploy
          echo "✅ nginx.conf.deploy generated"

      # ── 5. Sync code to VPS ──────────────────────────────────────────────
      - name: 📦 Sync code to VPS via rsync
        run: |
          # Ensure remote directory exists
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p ${{ env.DEPLOY_DIR }}/nginx/ssl ${{ env.DEPLOY_DIR }}/nginx/logs ${{ env.DEPLOY_DIR }}/data"

          # Sync project files (exclude heavy / unnecessary dirs)
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.playwright-mcp' \
            --exclude='*.tsbuildinfo' \
            --exclude='next-env.d.ts' \
            --exclude='.env*' \
            --exclude='*.log' \
            --exclude='chesapeake-html-css/' \
            --exclude='chesapeake-chatbot/' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_DIR }}/

          echo "✅ Code synced to ${{ env.DEPLOY_DIR }}"

      # ── 6. Upload generated .env and nginx config ────────────────────────
      - name: 📄 Upload generated config files
        run: |
          scp .env.production ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_DIR }}/.env
          scp nginx/nginx.conf.deploy ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_DIR }}/nginx/nginx.conf
          echo "✅ Config files uploaded"

      # ── 7. Build & deploy on VPS ─────────────────────────────────────────
      - name: 🐳 Build and start containers on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            set -e

            echo "═══ Deploying Chesapeake Chatbot ═══"

            cd ${{ env.DEPLOY_DIR }}

            # Fix data directory permissions (critical for bind mount)
            echo "Fixing data directory permissions..."
            mkdir -p data
            chown -R 1001:1001 data
            chmod -R 755 data
            ls -la data/ || echo "Data directory created"

            # Clean up problematic Docker volumes before starting
            echo "Cleaning up Docker volumes..."
            docker compose \
              -f docker-compose.yml \
              --profile production \
              down --volumes --remove-orphans 2>/dev/null || true

            # Remove old PostgreSQL and Redis containers if they exist
            echo "Removing old PostgreSQL and Redis containers..."
            docker stop chatbot-postgres 2>/dev/null || true
            docker rm -f chatbot-postgres 2>/dev/null || true
            docker stop chatbot-redis 2>/dev/null || true
            docker rm -f chatbot-redis 2>/dev/null || true

            # Remove old PostgreSQL and Redis volumes if they exist
            docker volume rm -f chesapeake-chatbot_postgres_data 2>/dev/null || true
            docker volume rm -f chesapeake-chatbot_redis_data 2>/dev/null || true

            # Preserve chatbot_data volume across deployments, only create if missing
            echo "Checking chatbot_data volume..."
            if ! docker volume inspect chesapeake-chatbot_chatbot_data >/dev/null 2>&1; then
                echo "Creating chatbot_data volume..."
                docker volume create chesapeake-chatbot_chatbot_data 2>/dev/null || true
            else
                echo "chatbot_data volume already exists, preserving data."
            fi

            # Generate self-signed SSL certificates if they do not exist
            echo "Checking for SSL certificates..."
            if [ ! -f "nginx/ssl/fullchain.pem" ] || [ ! -f "nginx/ssl/privkey.pem" ]; then
                echo "SSL certificates not found. Generating self-signed certificates..."

                # Extract domain from nginx config (use HTTPS server block - last occurrence)
                DOMAIN=$(grep "server_name" nginx/nginx.conf | tail -1 | awk '\''{print $2}'\'' | sed '\''s/;//'\'')
                if [ -z "$DOMAIN" ] || [ "$DOMAIN" = "_" ] || [ "$DOMAIN" = "__DOMAIN_NAME__" ]; then
                    DOMAIN="localhost"
                fi
                echo "Using domain: $DOMAIN"

                # Create ssl directory if it does not exist
                mkdir -p nginx/ssl

                # Generate self-signed certificate
                openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                  -keyout nginx/ssl/privkey.pem \
                  -out nginx/ssl/fullchain.pem \
                  -subj "/C=US/ST=Virginia/L=Chesapeake/O=Chesapeake City/CN=$DOMAIN"

                # Create chain.pem (same as fullchain for self-signed)
                cp nginx/ssl/fullchain.pem nginx/ssl/chain.pem 2>/dev/null || true

                echo "Self-signed SSL certificates generated for $DOMAIN."
            else
                echo "SSL certificates already exist."
            fi

            # Generate DH parameters for nginx if they do not exist
            echo "Checking for DH parameters..."
            if [ ! -f "nginx/ssl/dhparam.pem" ]; then
                echo "DH parameters not found. Generating 2048-bit DH params (this may take a minute)..."
                openssl dhparam -out nginx/ssl/dhparam.pem 2048 2>/dev/null || true
                if [ -f "nginx/ssl/dhparam.pem" ]; then
                    echo "DH parameters generated."
                else
                    echo "Warning: DH parameter generation failed, but continuing deployment."
                fi
            else
                echo "DH parameters already exist."
            fi

            # Pull latest images (for nginx and other services)
            docker compose \
              -f docker-compose.yml \
              --profile production \
              pull --ignore-pull-failures

            # Build and start (or restart) containers
            docker compose \
              -f docker-compose.yml \
              --profile production \
              up -d --build --remove-orphans

            # Wait for Ollama model to be available (entrypoint script handles pulling)
            echo "Waiting for Ollama model to be available..."
            for i in $(seq 1 60); do
              if docker exec chatbot-ollama ollama list >/dev/null 2>&1 && \
                 docker exec chatbot-ollama ollama list | grep -q "qwen2.5:1.5b"; then
                echo "✅ Ollama model is available after ${i}s"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "   Still waiting for model (this may take several minutes on first run)..."
              fi
              echo -n "."
              sleep 2
            done
            echo ""

            echo "✅ Containers are up"
          '
          echo "✅ Build & deploy command completed"

      # ── 8. Health check ──────────────────────────────────────────────────
      - name: 🩺 Health check
        run: |
          echo "Waiting for chatbot to become healthy..."
          # Poll the health endpoint up to 60 seconds
          for i in $(seq 1 30); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 \
              --max-time 10 \
              "http://${{ secrets.VPS_HOST }}:3000/api/chat" 2>/dev/null || echo "000")

            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "405" ]; then
              echo "✅ Health check passed (HTTP $HTTP_STATUS) after ${i}s"
              exit 0
            fi

            if [ "$HTTP_STATUS" != "000" ]; then
              echo "   Attempt $i/30 — HTTP $HTTP_STATUS, waiting..."
            else
              echo "   Attempt $i/30 — connection refused, waiting..."
            fi
            sleep 2
          done

          echo "❌ Health check failed — chatbot did not become healthy within 60s"
          echo ""
          echo "=== Last logs from chatbot container ==="
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ env.DEPLOY_DIR }} && docker compose -f docker-compose.yml --profile production logs --tail=50 chatbot"
          exit 1

      # ── 9. Deployment summary ─────────────────────────────────────────────
      - name: 📋 Deployment summary
        if: always()
        run: |
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY

          # Get container status from VPS
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ env.DEPLOY_DIR }} && docker compose -f docker-compose.yml --profile production ps --format 'table {{.Name}}\t{{.Status}}\t{{.Ports}}'" \
            | while IFS= read -r line; do
              NAME=$(echo "$line" | awk '{print $1}')
              STATUS=$(echo "$line" | awk '{print $2}')
              echo "| $NAME | $STATUS |" >> $GITHUB_STEP_SUMMARY
            done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **Frontend:** https://${{ secrets.DOMAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🕒 Deployed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
